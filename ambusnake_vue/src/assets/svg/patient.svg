<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Inverted U Bed Frame -->
  <path d="M 76 440 L 76 340 L 436 340 L 436 440 L 420 440 L 420 356 L 92 356 L 92 440 Z" fill="#2c3e50"/>

  <!-- Left Vertical Bar (Footboard) with a gap of 19.2px (1.2x bar thickness) -->
  <rect x="40.8" y="240" width="16" height="200" fill="#2c3e50"/>

  <!-- Right Vertical Bar (Headboard) - Symmetric positioning with left bar (gap of 19.2px) -->
  <rect x="455.2" y="160" width="16" height="280" fill="#2c3e50"/>

  <!-- Complex Bedding Path (With the top-left corner of the square block rounded) -->
  <path d="M 76 320.8 
           L 436 320.8 
           L 436 180 
           L 316 279.2 
           L 196 279.2 
           L 196 240 
           L 86 240 
           Q 76 240 76 250 
           L 76 320.8 
           Z" 
        fill="#2c3e50"/>

  <!-- Thin Vertical Bar (IV Pole) shifted slightly to the left (x=204, gap of 8px) -->
  <rect x="204" y="70" width="8" height="209.2" fill="#2c3e50"/>

  <!-- Complex Patient Body Polygon -->
  <polygon points="220,271.2 316,271.2 436,172 376,172 296,240 220,240" fill="#2563eb"/>

  <!-- Patient Head: Blue circle centered on the horizontal shoulder line (x=406, y=140, r=24) -->
  <circle cx="406" cy="140" r="24" fill="#2563eb"/>
</svg>
