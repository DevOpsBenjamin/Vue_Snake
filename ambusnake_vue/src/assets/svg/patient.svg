  <!-- Left Leg -->
  <rect x="96" y="320" width="16" height="110" rx="4" fill="#2c3e50"/>
  <!-- Right Leg -->
  <rect x="400" y="320" width="16" height="110" rx="4" fill="#2c3e50"/>
  
  <!-- Horizontal Base Bar -->
  <rect x="80" y="320" width="352" height="16" rx="4" fill="#2c3e50"/>

  <!-- Footboard (Left) -->
