<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Shadow -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-opacity="0.15" flood-color="#0b1b3d"/>
    </filter>

    <!-- Body Gradient (Soft White to Light Gray) -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2f5"/>
    </linearGradient>

    <!-- Windshield Gradient (Sleek Glass Look) -->
    <linearGradient id="windshieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Windshield Reflection -->
    <linearGradient id="reflectionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>

    <!-- Red Cross Gradient -->
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>

    <!-- Siren Blue Light Gradient -->
    <linearGradient id="sirenBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Siren Red Light Gradient -->
    <linearGradient id="sirenRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>

    <!-- Headlight Glow -->
    <radialGradient id="lightGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="1"/>
      <stop offset="50%" stop-color="#facc15" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Side Mirrors -->
  <rect x="330" y="40" width="32" height="50" rx="12" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="4"/>
  <rect x="330" y="422" width="32" height="50" rx="12" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="4"/>

  <!-- Main Ambulance Body -->
  <rect x="32" y="80" width="416" height="352" rx="72" fill="url(#bodyGrad)" filter="url(#drop-shadow)" stroke="#cbd5e1" stroke-width="6"/>

  <!-- Headlights -->
  <!-- Upper Headlight -->
  <path d="M 420 110 A 30 30 0 0 1 448 140 L 448 170 A 10 10 0 0 1 438 180 L 420 180 Z" fill="#facc15"/>
  <ellipse cx="452" cy="145" rx="35" ry="55" fill="url(#lightGlow)" transform="rotate(15 452 145)"/>
  <!-- Lower Headlight -->
  <path d="M 420 402 A 30 30 0 0 0 448 372 L 448 342 A 10 10 0 0 0 438 332 L 420 332 Z" fill="#facc15"/>
  <ellipse cx="452" cy="367" rx="35" ry="55" fill="url(#lightGlow)" transform="rotate(-15 452 367)"/>

  <!-- Front Windshield -->
  <rect x="340" y="112" width="64" height="288" rx="24" fill="url(#windshieldGrad)"/>
  <!-- Gloss reflection on windshield -->
  <path d="M 345 130 L 380 130 L 350 382 L 345 382 Z" fill="url(#reflectionGrad)"/>

  <!-- Red Cross on the roof -->
  <g transform="translate(160, 256)">
    <!-- Shadow for the cross -->
    <rect x="-65" y="-20" width="130" height="40" rx="8" fill="#000000" opacity="0.08"/>
    <rect x="-20" y="-65" width="40" height="130" rx="8" fill="#000000" opacity="0.08"/>
    <!-- Actual Cross -->
    <rect x="-64" y="-20" width="128" height="40" rx="6" fill="url(#crossGrad)"/>
    <rect x="-20" y="-64" width="40" height="128" rx="6" fill="url(#crossGrad)"/>
  </g>

  <!-- Siren Lightbar (Red and Blue) -->
  <g transform="translate(290, 256)">
    <!-- Lightbar base -->
    <rect x="-15" y="-105" width="30" height="210" rx="10" fill="#334155" stroke="#1e293b" stroke-width="4"/>
    <!-- Blue Light (top side) -->
    <rect x="-11" y="-95" width="22" height="90" rx="6" fill="url(#sirenBlue)"/>
    <ellipse cx="0" cy="-50" rx="25" ry="40" fill="#60a5fa" opacity="0.25"/>
    <!-- Red Light (bottom side) -->
    <rect x="-11" y="5" width="22" height="90" rx="6" fill="url(#sirenRed)"/>
    <ellipse cx="0" cy="50" rx="25" ry="40" fill="#f87171" opacity="0.25"/>
    <!-- Middle connector -->
    <rect x="-13" y="-5" width="26" height="10" fill="#64748b"/>
  </g>

  <!-- Cool Roof Panel Lines (Vents/Indents) -->
  <rect x="70" y="140" width="50" height="20" rx="4" fill="#cbd5e1" opacity="0.5"/>
  <rect x="70" y="352" width="50" height="20" rx="4" fill="#cbd5e1" opacity="0.5"/>

  <!-- Rear bumper outline -->
  <path d="M 32 150 L 32 362" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
</svg>
