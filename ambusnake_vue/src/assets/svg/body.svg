<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern Drop Shadow for the entire star -->
    <filter id="star-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#0b132b" flood-opacity="0.3"/>
    </filter>

    <!-- Deep Navy to Royal/Electric Blue Gradient -->
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>   <!-- Deep Navy -->
      <stop offset="60%" stop-color="#1d4ed8"/>  <!-- Royal Blue -->
      <stop offset="100%" stop-color="#3b82f6"/> <!-- Bright Blue -->
    </linearGradient>

    <!-- Inner Border Glow Gradient -->
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/> <!-- Bright Cyan/Blue -->
      <stop offset="100%" stop-color="#2563eb"/> <!-- Medium Blue -->
    </linearGradient>
  </defs>

  <!-- Star of Life using a single continuous path to prevent any internal overlapping lines -->
  <g filter="url(#star-shadow)">
    <!-- Main Star Path -->
    <path d="M 201.00 46.00 
             L 311.00 46.00 
             L 311.00 160.74 
             L 410.37 103.37 
             L 465.37 198.63 
             L 366.00 256.00 
             L 465.37 313.37 
             L 410.37 408.63 
             L 311.00 351.26 
             L 311.00 466.00 
             L 201.00 466.00 
             L 201.00 351.26 
             L 101.63 408.63 
             L 46.63 313.37 
             L 146.00 256.00 
             L 46.63 198.63 
             L 101.63 103.37 
             L 201.00 160.74 
             Z" 
          fill="url(#starGrad)" 
          stroke="url(#innerGlow)" 
          stroke-width="12" 
          stroke-linejoin="round"/>
          
    <!-- Subtle outer highlight border to make the rounded corners pop even more -->
    <path d="M 201.00 46.00 
             L 311.00 46.00 
             L 311.00 160.74 
             L 410.37 103.37 
             L 465.37 198.63 
             L 366.00 256.00 
             L 465.37 313.37 
             L 410.37 408.63 
             L 311.00 351.26 
             L 311.00 466.00 
             L 201.00 466.00 
             L 201.00 351.26 
             L 101.63 408.63 
             L 46.63 313.37 
             L 146.00 256.00 
             L 46.63 198.63 
             L 101.63 103.37 
             L 201.00 160.74 
             Z" 
          fill="none" 
          stroke="#93c5fd" 
          stroke-width="3" 
          stroke-linejoin="round"
          opacity="0.6"/>
  </g>
</svg>
